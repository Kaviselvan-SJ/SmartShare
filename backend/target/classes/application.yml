spring:
  application:
    name: smartshare
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: ${DB_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: ${PORT:8080}

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:smartshare-files}
  access-key: ${AWS_ACCESS_KEY_ID:changeme}
  secret-key: ${AWS_SECRET_ACCESS_KEY:changeme}
  region: ${AWS_REGION:us-east-1}

firebase:
  project-id: ${FIREBASE_PROJECT_ID:your-firebase-project-id}

admin:
  emails: ${ADMIN_EMAILS:admin@smartshare.com}
